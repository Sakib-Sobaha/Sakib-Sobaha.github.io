<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" role="img" aria-label="SMS Portfolio">
  <defs>
    <linearGradient id="blade1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="blade2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="blade3" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="core" cx="38%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#bae6fd"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="depth" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="90" cy="90" r="86" fill="#1e1b4b"/>
  <circle cx="90" cy="90" r="86" fill="none" stroke="url(#ring)" stroke-width="7" filter="url(#glow)"/>

  <g filter="url(#depth)">
    <g transform="rotate(0 90 90)">
      <path d="M90 90 L90 20 A 70 70 0 0 1 150 104 Z" fill="url(#blade1)"/>
    </g>
    <g transform="rotate(120 90 90)">
      <path d="M90 90 L90 20 A 70 70 0 0 1 150 104 Z" fill="url(#blade2)"/>
    </g>
    <g transform="rotate(240 90 90)">
      <path d="M90 90 L90 20 A 70 70 0 0 1 150 104 Z" fill="url(#blade3)"/>
    </g>
  </g>

  <circle cx="90" cy="90" r="32" fill="url(#core)" filter="url(#glow)"/>
  <ellipse cx="78" cy="78" rx="11" ry="7" fill="#ffffff" opacity="0.55" transform="rotate(-25 78 78)"/>

  <circle cx="124" cy="50" r="9.5" fill="#22d3ee"/>
  <circle cx="124" cy="50" r="9.5" fill="#ffffff" opacity="0.35"/>
</svg>
